apiVersion: argoproj.io/v1alpha1

kind: Application


metadata:

  name: payment-service
  namespace: argocd


spec:

  project: default


  source:

    repoURL: <repo-url>

    targetRevision: main

    path: .


  destination:

    server: https://kubernetes.default.svc

    namespace: default


  syncPolicy:

    automated:

      selfHeal: false
